<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Results - srcAnalyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            width: 70%;
            margin: 50px auto;
        }

        h1 {
            color: #38bdf8;
        }

        hr {
            margin: 20px auto;
            width: 80%;
            height: 2px;
            background-color: #38bdf8;
            border: none;
        }

        .results-box {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background-color: #38bdf8;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Analysis Results</h1>

        <hr>

        <div class="results-box" id="results">
            <p>Analyzing...</p>
        </div>

        <button onclick="goBack()">Analyze Another</button>
    </div>

    <script>
        // Get code from index page
        let code = localStorage.getItem("code");

        // TEMPORARY fake results (replace with backend later)
        let issues = [
            "Function may be too long",
            "Variable name 'x' is unclear",
            "No comments found"
        ];

        let resultsDiv = document.getElementById("results");

        resultsDiv.innerHTML =
            "<ul>" +
            issues.map(i => "<li>" + i + "</li>").join("") +
            "</ul>";

        function goBack() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
